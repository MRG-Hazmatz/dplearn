/* ─── Reset & Base ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

<script type="text/babel" data-presets="env,react">
/* ═══════════════════════════════════════════════════════════════════
   DPlearn — Interactive Differential Privacy Course
   Single-file React app (via Babel Standalone + CDN)
   ═══════════════════════════════════════════════════════════════════ */

const { useState, useEffect, useRef, useMemo, useCallback, Fragment } = React;

/* ─── Color Tokens ────────────────────────────────────────────── */
const C = {
  blue:   '#3b82f6',
  red:    '#ef4444',
  green:  '#22c55e',
  amber:  '#f59e0b',
  purple: '#a855f7',
  teal:   '#14b8a6',
  orange: '#f97316',
  gray:   '#94a3b8',
  bg:     '#0b1220',
  panel:  '#111a2e',
  panel2: '#1a2540',
  border: '#1e293b',
  text:   '#e2e8f0',
  mute:   '#94a3b8',
};

const COMPANY_COLORS = {
  Google:    '#d4a017',
  Apple:     '#e85d5d',
  LinkedIn:  '#0a66c2',
  Uber:      '#64748b',
  Microsoft: '#22c55e',
};

/* ─── Utilities ────────────────────────────────────────────────── */
// Laplace noise generator: inverse CDF method
function laplace(scale) {
  const u = Math.random() - 0.5;
  if (Math.abs(u) < 1e-9) return 0;
  return -Math.sign(u) * scale * Math.log(1 - 2 * Math.abs(u));
}

// Clamp helper
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// Deterministic-ish pseudo-random using a seed (for stable visuals)
function seededRandom(seed) {
  let s = seed;
  return () => {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

/* ─── Primitive Components ─────────────────────────────────────── */

function Button({ children, onClick, color = C.blue, ghost, small, disabled, icon, fullWidth, type = 'button' }) {
  const [hover, setHover] = useState(false);
  const base = {
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
    padding: small ? '6px 14px' : '11px 22px',
    borderRadius: 10,
    fontSize: small ? 12 : 14,
    fontWeight: 600,
    fontFamily: 'inherit',
    border: ghost ? `1.5px solid ${color}` : 'none',
    background: disabled ? '#1e293b' : ghost ? (hover ? color + '18' : 'transparent') : (hover ? color : color + 'dd'),
    color: disabled ? '#64748b' : ghost ? color : '#fff',
    cursor: disabled ? 'not-allowed' : 'pointer',
    transition: 'all 0.18s cubic-bezier(.2,.9,.3,1.2)',
    opacity: disabled ? 0.55 : 1,
    boxShadow: !ghost && !disabled ? (hover ? `0 6px 20px ${color}55` : `0 2px 8px ${color}22`) : 'none',
    transform: hover && !disabled ? 'translateY(-1px)' : 'none',
    width: fullWidth ? '100%' : 'auto',
    lineHeight: 1.4,
    letterSpacing: '0.01em',
  };
  return (
    <button
      type={type}
      onClick={onClick}
      disabled={disabled}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={base}
    >
      {icon}
      {children}
    </button>
  );
}

function Tag({ children, color = C.blue, size = 'sm' }) {
  return (
    <span
      className="mono"
      style={{
        display: 'inline-block',
        fontSize: size === 'sm' ? 10 : 11,
        fontWeight: 600,
        padding: '3px 9px',
        borderRadius: 5,
        letterSpacing: '0.08em',
        background: color + '22',
        color,
        border: `1px solid ${color}44`,
        textTransform: 'uppercase',
      }}
    >
      {children}
    </span>
  );
}

function Card({ children, style = {}, className = '', onClick, hoverable }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      className={className}
      onClick={onClick}
      onMouseEnter={hoverable ? () => setHover(true) : undefined}
      onMouseLeave={hoverable ? () => setHover(false) : undefined}
      style={{
        background: 'linear-gradient(180deg, #121c33 0%, #0f1828 100%)',
        border: `1px solid ${hover ? '#334155' : '#1e293b'}`,
        borderRadius: 14,
        padding: '16px 20px',
        transition: 'all 0.2s',
        transform: hover && hoverable ? 'translateY(-2px)' : 'none',
        boxShadow: hover && hoverable ? '0 8px 24px rgba(0,0,0,0.3)' : '0 2px 8px rgba(0,0,0,0.15)',
        ...style,
      }}
    >
      {children}
    </div>
  );
}

function Meter({ label, pct, color, animate = true }) {
  return (
    <div style={{ marginBottom: 12, width: '100%' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
        <span className="mono" style={{ fontSize: 10, color: C.mute, letterSpacing: '0.08em' }}>{label}</span>
        <span className="mono" style={{ fontSize: 10, color, fontWeight: 600 }}>{pct}%</span>
      </div>
      <div style={{ background: '#1e293b', borderRadius: 4, height: 6, overflow: 'hidden' }}>
        <div style={{
          height: '100%',
          width: pct + '%',
          background: `linear-gradient(90deg, ${color}aa, ${color})`,
          transition: animate ? 'width 0.4s cubic-bezier(.2,.9,.3,1.2), background 0.3s' : 'none',
          borderRadius: 4,
          boxShadow: `0 0 8px ${color}55`,
        }} />
      </div>
    </div>
  );
}

function ModuleHeader({ tagLabel, tagColor, title, subtitle }) {
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ marginBottom: 8 }}>
        <Tag color={tagColor}>{tagLabel}</Tag>
      </div>
      <h2 className="syne" style={{ fontSize: 28, fontWeight: 800, marginBottom: 6, color: '#f1f5f9', lineHeight: 1.15 }}>
        {title}
      </h2>
      {subtitle && (
        <p style={{ color: C.mute, fontSize: 14, lineHeight: 1.65, maxWidth: 680 }}>{subtitle}</p>
      )}
    </div>
  );
}

function NextButton({ onClick, label = 'Continue →' }) {
  return (
    <div style={{ marginTop: 28, display: 'flex', justifyContent: 'flex-end' }}>
      <Button onClick={onClick}>{label}</Button>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   MODULE 0 — HOOK: Real Breaches
   ═══════════════════════════════════════════════════════════════════ */
const BREACHES = [
  { text: '87 million Facebook profiles exposed — Cambridge Analytica, 2018', severe: true },
  { text: 'US Census 2010: reconstruction attack recovers individual records from published stats', severe: false },
  { text: 'Uber driver locations reconstructed via repeated SQL queries — zero hacking required', severe: true },
  { text: 'LinkedIn salary ranges inferred by advertisers through query differencing', severe: false },
  { text: '533 million Facebook records posted publicly — phone numbers, birthdates, locations', severe: true },
  { text: 'Hospital patient re-identified from "anonymized" data using zip code + birthdate', severe: false },
];

function M0_Hook({ onNext }) {
  const [phase, setPhase] = useState('splash');
  const [visible, setVisible] = useState([]);
  const [pivotReady, setPivotReady] = useState(false);
  const timersRef = useRef([]);

  const clearTimers = () => {
    timersRef.current.forEach(t => clearTimeout(t));
    timersRef.current = [];
  };

  const play = () => {
    clearTimers();
    setPhase('play');
    setVisible([]);
    setPivotReady(false);
    BREACHES.forEach((_, i) => {
      timersRef.current.push(setTimeout(() => setVisible(v => [...v, i]), i * 720 + 250));
    });
    timersRef.current.push(setTimeout(() => setPivotReady(true), BREACHES.length * 720 + 550));
  };

  useEffect(() => () => clearTimers(), []);

  if (phase === 'splash') {
    return (
      <div style={{ padding: '4rem 1.5rem 2rem', textAlign: 'center', maxWidth: 560, margin: '0 auto' }} className="fade-up">
        <div style={{
          width: 104, height: 104, borderRadius: '50%',
          margin: '0 auto 32px',
          border: '2px solid ' + C.blue + '33',
          background: 'radial-gradient(circle, ' + C.blue + '22 0%, transparent 75%)',
          display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 46,
          boxShadow: '0 0 60px ' + C.blue + '33',
        }}>🔐</div>
        <h1 className="syne" style={{ fontSize: 48, fontWeight: 800, marginBottom: 16, color: '#f1f5f9', lineHeight: 1.1 }}>
          Differential <span style={{ color: C.blue }}>Privacy</span>
        </h1>
        <p style={{ color: C.mute, fontSize: 16, lineHeight: 1.75, maxWidth: 460, margin: '0 auto 44px' }}>
          An interactive course on the mathematics of data privacy — real breaches, live demos, hands-on experiments.
        </p>
        <Button onClick={play}>Begin the course →</Button>
        <p className="mono" style={{ marginTop: 32, fontSize: 11, color: '#475569', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
          9 modules · ~15 minutes
        </p>
      </div>
    );
  }

  return (
    <div style={{ padding: '1.5rem 1.25rem', maxWidth: 720, margin: '0 auto' }}>
      <div style={{ marginBottom: '1.5rem' }}>
        <p className="mono" style={{ fontSize: 10, color: C.mute, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 14 }}>
          A brief history of "anonymous" data
        </p>
        {BREACHES.map((b, i) => (
          <div
            key={i}
            style={{
              marginBottom: 10,
              padding: '13px 16px',
              borderLeft: `3px solid ${b.severe ? C.red : C.amber}`,
              borderRadius: '0 10px 10px 0',
              background: b.severe ? C.red + '08' : C.amber + '08',
              display: 'flex',
              gap: 14,
              alignItems: 'flex-start',
              opacity: visible.includes(i) ? 1 : 0,
              transform: visible.includes(i) ? 'none' : 'translateX(-20px)',
              transition: 'opacity 0.5s, transform 0.5s cubic-bezier(.2,.9,.3,1.2)',
            }}
          >
            <span
              className="mono"
              style={{
                fontSize: 9, fontWeight: 700,
                color: b.severe ? C.red : C.amber,
                flexShrink: 0, letterSpacing: '0.08em',
                padding: '2px 7px', borderRadius: 4,
                background: (b.severe ? C.red : C.amber) + '15',
                marginTop: 2,
              }}
            >
              BREACH
            </span>
            <span style={{ fontSize: 14, lineHeight: 1.6, color: '#e2e8f0' }}>{b.text}</span>
          </div>
        ))}
      </div>
      {pivotReady && (
        <div className="fade-up" style={{ textAlign: 'center', paddingTop: '1rem' }}>
          <p className="mono" style={{ fontSize: 11, color: C.mute, letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 18 }}>
            None of these required hacking
          </p>
          <h2 className="syne" style={{ fontSize: 30, fontWeight: 800, lineHeight: 1.3, marginBottom: 16, color: '#f1f5f9' }}>
            What if <span style={{ color: C.blue }}>mathematics</span> could make this impossible?
          </h2>
          <p style={{ color: C.mute, fontSize: 15, lineHeight: 1.75, maxWidth: 480, margin: '0 auto 32px' }}>
            Differential Privacy is a mathematical guarantee that lets us learn from data without ever exposing what any individual contributed.
          </p>
          <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
            <Button onClick={play} ghost small color={C.gray}>↺ Replay</Button>
            <Button onClick={onNext}>Start the course →</Button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   MODULE 1 — GLOSSARY: Floating Terms
   ═══════════════════════════════════════════════════════════════════ */
const TERMS = [
  { id: 'dp', label: 'Differential Privacy', color: C.blue,
    def: 'A mathematical guarantee that adds carefully calibrated random noise to outputs, ensuring no individual\'s contribution can be detected regardless of how many queries are run.',
    example: 'A hospital publishes "average age of cancer patients" with DP. Even knowing every other patient\'s age, you still cannot determine any single patient\'s value.' },
  { id: 'eps', label: 'Epsilon (ε)', color: C.purple,
    def: 'The privacy dial. Small ε means strong privacy but noisier results. Large ε means more accurate results but weaker privacy. Real deployments use ε between 0.1 and 10.',
    example: 'Apple uses ε=4 for emoji and Safari analytics, ε=2 for Health data, and ε=1 for Photos scene learning. Google\'s COVID Mobility Reports used ε=0.44 per metric per day.' },
  { id: 'delta', label: 'Delta (δ)', color: C.purple,
    def: 'A tiny probability that the strict ε guarantee might fail. Usually set to something like 0.000001. The guarantee holds with probability 1−δ.',
    example: '(ε=1, δ=0.00001): "With 99.999% probability, privacy loss is bounded by ε=1."' },
  { id: 'noise', label: 'Noise', color: C.amber,
    def: 'The random value added to a query result. Drawn from the Laplace or Gaussian distribution. More noise means stronger privacy but less accurate results.',
    example: 'True answer: 48,291 trips. Noise added: +14. Answer returned: 48,305. Accurate for decisions, impossible to reverse-engineer.' },
  { id: 'sens', label: 'Sensitivity', color: C.amber,
    def: 'How much can ONE person\'s data change a query result? High sensitivity means one person has a large impact and more noise is required to protect them.',
    example: '"Total salary of all employees" — high sensitivity. "Average salary of 10,000 employees" — much lower sensitivity.' },
  { id: 'cent', label: 'Central DP', color: C.green,
    def: 'The organization holds raw data centrally and adds noise to outputs before sharing. Requires trusting the data collector. Generally more accurate than Local DP at the same ε.',
    example: 'Uber\'s CHORUS: raw trip data sits on Uber\'s servers. Analysts\' queries are intercepted and noise added before results are returned.' },
  { id: 'local', label: 'Local DP', color: C.green,
    def: 'Noise is added directly on the user\'s device before data ever leaves it. The server never sees raw data — even a server breach exposes only noise.',
    example: 'Apple adds noise to your emoji usage on your iPhone before sending it. Apple\'s servers literally cannot see what you actually typed.' },
  { id: 'unit', label: 'Privacy Unit', color: C.teal,
    def: 'The entity being protected — a person, device, session, or company. One unit\'s presence or absence must barely change any output.',
    example: 'In Uber\'s system, the privacy unit is the individual rider or driver. In LinkedIn\'s, it is the member profile.' },
  { id: 'bud', label: 'Privacy Budget', color: C.red,
    def: 'A running total of privacy "spent" by running queries. When exhausted, no more queries are allowed — preventing attackers from canceling noise through repetition.',
    example: 'LinkedIn tracks a privacy budget per advertiser. Once spent, they cannot extract further demographic insights about individual members.' },
  { id: 'lap', label: 'Laplace Mechanism', color: C.teal,
    def: 'The most common DP noise mechanism. Draws random noise from the Laplace distribution. Noise scale = Sensitivity ÷ ε.',
    example: 'Release "sick days taken" with ε=1, sensitivity=1: add Laplace noise. Could be +2.3 or -0.8 — never the same twice.' },
  { id: 'comp', label: 'Composition', color: C.orange,
    def: 'The rule for combining privacy guarantees across multiple queries. Running k queries, each with ε privacy, costs up to k·ε total — which is why budgets matter.',
    example: 'Run 5 queries at ε=0.5 each → total privacy cost ≤ ε=2.5. Advanced composition and RDP give tighter bounds.' },
  { id: 'rr', label: 'Randomized Response', color: C.blue,
    def: 'The simplest Local DP technique: each respondent flips a coin and either tells the truth or reports a random answer. The server can statistically recover the population rate without learning any individual answer.',
    example: 'In a survey about drug use, a coin flip decides if your answer gets randomized. You have plausible deniability — but at scale, the true rate is still visible.' },
  { id: 'dpsgd', label: 'DP-SGD', color: C.red,
    def: 'Differentially Private Stochastic Gradient Descent. During ML training, gradients are clipped and noise is added per batch so the final model cannot memorize any single training example.',
    example: 'Google trains Gboard\'s next-word prediction with DP-SGD so the model can\'t leak messages you actually typed on your phone.' },
  { id: 'gauss', label: 'Gaussian Mechanism', color: C.teal,
    def: 'An alternative to Laplace that adds Gaussian (bell-curve) noise. Used when you accept a small δ in exchange for tighter bounds on the total privacy cost of many queries.',
    example: 'Apple\'s emoji analytics use the Gaussian mechanism because it composes better across millions of users reporting daily.' },
  { id: 'plaus', label: 'Plausible Deniability', color: C.orange,
    def: 'Any observed output could plausibly have come from a world where the individual never contributed their data. This is the human-readable promise behind the ε guarantee.',
    example: 'Even if an attacker sees "YES" next to your anonymous ID, they cannot prove it was your real answer — the coin flip could have produced it.' },
];

// ── 2B: RECONSTRUCTION ATTACK — story-driven game ──────────────────
// Reporter Quinn tries to uncover each employee's secret salary at
// Luna Labs by running only "innocent" aggregate queries.
const RECON_EMPLOYEES = [
  { name: 'Anya',  emoji: '👩‍💼', trueSalary: 72 },
  { name: 'Ben',   emoji: '👨‍💼', trueSalary: 95 },
  { name: 'Cara',  emoji: '👩‍🔬', trueSalary: 58 },
  { name: 'Dev',   emoji: '👨‍🔬', trueSalary: 84 },
  { name: 'Ela',   emoji: '👩‍💻', trueSalary: 67 },
  { name: 'Finn',  emoji: '👨‍💻', trueSalary: 91 },
];

const RECON_QUERIES = [
  { id: 'sum',    label: 'SUM of all salaries',    formula: 'Σ(salary)' },
  { id: 'avg',    label: 'AVERAGE salary',         formula: 'Σ(salary) / n' },
  { id: 'max',    label: 'MAXIMUM salary',         formula: 'max(salary)' },
  { id: 'min',    label: 'MINIMUM salary',         formula: 'min(salary)' },
  { id: 'top2',   label: 'SUM of TOP 2 salaries',  formula: 'max₁ + max₂' },
  { id: 'over80', label: 'COUNT over $80k',        formula: '|{s ≥ 80}|' },
];

function ReconstructionAttack() {
  const [runIds, setRunIds] = useState([]);

  const run = id => {
    setRunIds(prev => prev.includes(id) ? prev : [...prev, id]);
  };
  const reset = () => setRunIds([]);

  const numRun = runIds.length;
  const totalQ = RECON_QUERIES.length;
  const pct = numRun / totalQ;
  const exposed = numRun >= totalQ;

  // Spread shrinks non-linearly — each query collapses the search space more dramatically
  const maxSpread = 30;
  const spread = Math.max(1.2, maxSpread * Math.pow(1 - pct, 1.5));

  const sals = RECON_EMPLOYEES.map(e => e.trueSalary);
  const totalTrue = sals.reduce((a, b) => a + b, 0);

  const computeAnswer = id => {
    switch (id) {
      case 'sum':    return '$' + totalTrue + 'k';
      case 'avg':    return '$' + Math.round(totalTrue / sals.length) + 'k';
      case 'max':    return '$' + Math.max(...sals) + 'k';
      case 'min':    return '$' + Math.min(...sals) + 'k';
      case 'top2': {
        const s = [...sals].sort((a, b) => b - a);
        return '$' + (s[0] + s[1]) + 'k';
      }
      case 'over80': return sals.filter(v => v >= 80).length + ' people';
      default: return '—';
    }
  };

  const storyMsg = (() => {
    if (numRun === 0) return '📰 Reporter Quinn suspects Luna Labs has huge pay gaps. HR only releases aggregate stats — never individuals. But Quinn has a plan…';
    if (numRun === 1) return '🔍 One number down. Every salary could still be almost anything — the picture is blurry.';
    if (numRun === 2) return '🎯 Two queries, two constraints. The possibilities are shrinking.';
    if (numRun === 3) return '⚡ Half the queries in. The math is starting to click — ranges are collapsing.';
    if (numRun === 4) return '💥 Four aggregates later, individuals are becoming recognizable.';
    if (numRun === 5) return '🚨 One query away from a full reconstruction…';
    return '💀 EXPOSED. Every single salary recovered — from queries that never asked for a single name.';
  })();

  const bannerColor = exposed ? C.red : numRun >= totalQ - 1 ? C.amber : C.blue;

  return (
    <div>
      <p style={{ fontSize: 13.5, color: C.mute, lineHeight: 1.65, marginBottom: 14 }}>
        Each "innocent" aggregate is a constraint on individual values. Stack enough of them and the math lets you reconstruct every single salary — without ever asking a personal question.
      </p>

      {/* STORY BANNER */}
      <Card style={{
        background: bannerColor + '12',
        border: `1px solid ${bannerColor}55`,
        marginBottom: 14,
        transition: 'all 0.4s',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
          <div className="mono" style={{ fontSize: 9, color: bannerColor, letterSpacing: '0.1em', fontWeight: 700 }}>
            THE STORY — TURN {numRun}/{totalQ}
          </div>
          <div style={{ display: 'flex', gap: 3 }}>
            {RECON_QUERIES.map((_, i) => (
              <div key={i} style={{
                width: 14, height: 4, borderRadius: 2,
                background: i < numRun ? bannerColor : '#1e293b',
                transition: 'background 0.3s',
              }} />
            ))}
          </div>
        </div>
        <p style={{ fontSize: 14, lineHeight: 1.6, color: '#e2e8f0' }}>{storyMsg}</p>
      </Card>

      {/* EMPLOYEE POSSIBILITY BARS */}
      <Card style={{ marginBottom: 14 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
          <div className="mono" style={{ fontSize: 9, color: C.mute, letterSpacing: '0.08em', fontWeight: 600 }}>
            SALARY SEARCH SPACE
          </div>
          <div className="mono" style={{ fontSize: 9, color: C.mute }}>
            $40k &nbsp;────────&nbsp; $120k
          </div>
        </div>
        {RECON_EMPLOYEES.map(emp => {
          const lo = Math.max(40, emp.trueSalary - spread);
          const hi = Math.min(120, emp.trueSalary + spread);
          const leftPct = ((lo - 40) / 80) * 100;
          const widthPct = Math.max(1.5, ((hi - lo) / 80) * 100);
          const truePct = ((emp.trueSalary - 40) / 80) * 100;

          return (
            <div key={emp.name} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
              <div style={{
                fontSize: 16,
                width: 26, height: 26,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: exposed ? C.red + '30' : '#0f1828',
                borderRadius: 7,
                border: `1px solid ${exposed ? C.red : C.border}`,
                transition: 'all 0.4s',
              }}>{emp.emoji}</div>
              <div style={{ fontSize: 12, fontWeight: 600, width: 38, color: exposed ? C.red : '#e2e8f0' }}>
                {emp.name}
              </div>
              <div style={{
                flex: 1, position: 'relative',
                height: 18, background: '#0a1020', borderRadius: 9, overflow: 'hidden',
                border: '1px solid ' + C.border,
              }}>
                <div style={{
                  position: 'absolute',
                  left: leftPct + '%',
                  width: widthPct + '%',
                  top: 0, bottom: 0,
                  background: exposed
                    ? `linear-gradient(90deg, ${C.red}, ${C.red}dd)`
                    : `linear-gradient(90deg, ${C.blue}66, ${C.blue}cc, ${C.blue}66)`,
                  borderRadius: 9,
                  transition: 'all 0.6s cubic-bezier(.2,.9,.3,1.2)',
                  boxShadow: exposed ? `0 0 10px ${C.red}88` : 'none',
                }} />
                {exposed && (
                  <div style={{
                    position: 'absolute',
                    left: `calc(${truePct}% - 1px)`,
                    top: -2, bottom: -2,
                    width: 2,
                    background: '#fff',
                    boxShadow: '0 0 6px #fff',
                  }} />
                )}
              </div>
              <div className="mono" style={{
                fontSize: 11, width: 72, textAlign: 'right',
                color: exposed ? C.red : C.mute, fontWeight: exposed ? 700 : 500,
                transition: 'color 0.4s',
              }}>
                {exposed ? `$${emp.trueSalary}k` : `$${Math.round(lo)}–${Math.round(hi)}k`}
              </div>
            </div>
          );
        })}
      </Card>

      {/* QUERY BUTTONS */}
      <div style={{ marginBottom: 12 }}>
        <div className="mono" style={{ fontSize: 9, color: C.mute, letterSpacing: '0.08em', fontWeight: 600, marginBottom: 8 }}>
          AGGREGATE QUERIES YOU CAN RUN
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 8 }}>
          {RECON_QUERIES.map(q => {
            const hasRun = runIds.includes(q.id);
            return (
              <button
                key={q.id}
                onClick={() => run(q.id)}
                disabled={hasRun}
                style={{
                  padding: '10px 12px',
                  borderRadius: 10,
                  fontFamily: 'inherit',
                  textAlign: 'left',
                  cursor: hasRun ? 'default' : 'pointer',
                  background: hasRun ? C.amber + '12' : '#0f1828',
                  border: `1px solid ${hasRun ? C.amber + '66' : C.border}`,
                  transition: 'all 0.2s',
                }}
                onMouseEnter={e => {
                  if (!hasRun) {
                    e.currentTarget.style.background = C.blue + '15';
                    e.currentTarget.style.borderColor = C.blue + '66';
                  }
                }}
                onMouseLeave={e => {
                  if (!hasRun) {
                    e.currentTarget.style.background = '#0f1828';
                    e.currentTarget.style.borderColor = C.border;
                  }
                }}
              >
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8 }}>
                  <span style={{ fontSize: 12, fontWeight: 600, color: hasRun ? C.amber : '#e2e8f0' }}>
                    {q.label}
                  </span>
                  {hasRun && (
                    <span className="mono" style={{ fontSize: 11, color: C.amber, fontWeight: 700 }}>
                      = {computeAnswer(q.id)}
                    </span>
                  )}
                </div>
                <div className="mono" style={{ fontSize: 9.5, color: C.mute, marginTop: 3 }}>
                  {q.formula}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <button
        onClick={reset}
        style={{
          background: 'none',
          border: '1px solid ' + C.border,
          color: C.mute,
          padding: '7px 14px',
          borderRadius: 8,
          cursor: 'pointer',
          fontFamily: 'inherit',
          fontSize: 11,
        }}
      >
        ↺ Reset the story
      </button>
    </div>
  );
}

// ── 2C: MEMBERSHIP INFERENCE ATTACK (visual, story-driven) ─────────
const MEMBERSHIP_PEOPLE = [
  { id: 'alice', name: 'Alice', emoji: '👩‍⚕️', inTraining: true,
    bio: 'Diagnosed with a rare condition in 2019. Her scan was in the training batch.',
    confNoDp: 92, confDp: 69 },
  { id: 'bob',   name: 'Bob',   emoji: '👨‍🦰', inTraining: false,
    bio: 'A stranger the model has never seen — his scan was NOT in training data.',
    confNoDp: 54, confDp: 66 },
  { id: 'carla', name: 'Carla', emoji: '👩‍🦱', inTraining: true,
    bio: 'A repeat patient. Her scans were processed dozens of times during training.',
    confNoDp: 89, confDp: 67 },
];

function MembershipAttack() {
  const [stage, setStage] = useState('intro'); // intro → probe → compare
  const [selectedId, setSelectedId] = useState(null);
  const [probeTick, setProbeTick] = useState(0);
  const [useDp, setUseDp] = useState(false);

  const selected = MEMBERSHIP_PEOPLE.find(p => p.id === selectedId);
  const confidence = !selected ? 0 : (useDp ? selected.confDp : selected.confNoDp);
  const threshold = 75;
  const inferred = confidence >= threshold;

  // Animate a "probe" tick so the meter jumps visibly each click
  const probe = id => {
    setSelectedId(id);
    setProbeTick(t => t + 1);
  };

  if (stage === 'intro') {
    return (
      <div>
        <Card style={{
          background: `linear-gradient(135deg, ${C.purple}18, ${C.purple}05)`,
          border: `1px solid ${C.purple}55`,
          marginBottom: 14,
          position: 'relative',
          overflow: 'hidden',
        }}>
          <div style={{
            position: 'absolute', top: -10, right: -10,
            fontSize: 80, opacity: 0.08, transform: 'rotate(-8deg)',
          }}>🧠</div>
          <div className="mono" style={{ fontSize: 9, color: C.purple, marginBottom: 8, letterSpacing: '0.1em', fontWeight: 700 }}>

const REGION_FIPS = {
  Northeast: [9, 23, 25, 33, 34, 36, 42, 44, 50],
  Southeast: [1, 5, 10, 12, 13, 21, 22, 24, 28, 37, 45, 47, 51, 54],
  Midwest:   [17, 18, 19, 20, 26, 27, 29, 31, 38, 39, 46, 55],
  Southwest: [4, 35, 40, 48],
  West:      [2, 6, 8, 15, 16, 30, 32, 41, 49, 53, 56],
};

function USMap({ region }) {
  const svgRef = useRef(null);
  const [geo, setGeo] = useState(null);
  const [fetchFailed, setFetchFailed] = useState(false);

  useEffect(() => {
    let cancelled = false;
    fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
      .then(r => { if (!r.ok) throw new Error('fetch failed'); return r.json(); })
      .then(data => { if (!cancelled) setGeo(data); })
      .catch(() => { if (!cancelled) setFetchFailed(true); });
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (!geo || !svgRef.current || typeof d3 === 'undefined' || typeof topojson === 'undefined') return;
    const el = svgRef.current;
    const containerWidth = el.parentElement?.offsetWidth || 520;
    const w = Math.min(containerWidth, 600);
    const h = Math.round(w * 0.58);

    const svg = d3.select(el).attr('viewBox', `0 0 ${w} ${h}`).attr('width', '100%').attr('height', h);
    svg.selectAll('*').remove();

    const projection = d3.geoAlbersUsa().scale(w * 1.3).translate([w / 2, h / 2]);
    const path = d3.geoPath(projection);
    const features = topojson.feature(geo, geo.objects.states).features;
    const activeSet = new Set(REGION_FIPS[region] || []);

    svg.selectAll('path').data(features).join('path')
      .attr('d', path)
      .attr('fill', d => region === 'Any' ? '#2a3552' : activeSet.has(+d.id) ? '#ef4444' : '#1a2540')
      .attr('stroke', '#0b1220')
      .attr('stroke-width', 0.8)
      .style('transition', 'fill 0.5s ease');
  }, [geo, region]);

  if (fetchFailed) {
    // Fallback: simple region indicator
    return (
      <div style={{
        borderRadius: 10,
        overflow: 'hidden',
        marginBottom: 12,
        background: '#0a1020',
        padding: 24,
        textAlign: 'center',
        border: '1px dashed ' + C.border,
      }}>
        <div className="mono" style={{ fontSize: 10, color: C.mute, marginBottom: 10, letterSpacing: '0.08em' }}>
          US REGION MAP
        </div>
        <div style={{ fontSize: 36, marginBottom: 6 }}>🗺️</div>
        <div style={{ fontSize: 14, color: region === 'Any' ? C.mute : C.red, fontWeight: 600 }}>
          {region === 'Any' ? 'No region filter' : `Filtering: ${region}`}
        </div>
        <div style={{ fontSize: 11, color: C.mute, marginTop: 6 }}>
          (Map assets unavailable offline — filter still works)
        </div>
      </div>
    );
  }

  return (
    <div style={{ borderRadius: 10, overflow: 'hidden', marginBottom: 12, background: '#0a1020', padding: 6, border: '1px solid ' + C.border }}>
      {!geo && (
        <div className="mono" style={{ textAlign: 'center', padding: 24, color: C.mute, fontSize: 11, letterSpacing: '0.08em' }}>
          LOADING US MAP…
        </div>
      )}
      <svg ref={svgRef} style={{ width: '100%', display: 'block' }} />
    </div>
  );
}

// Mini SVG line chart for the live dual-graph simulation
function MiniLineChart({ points, max = 100, color, h = 56, target = null }) {
  if (!points || points.length < 2) {
    return (
      <div style={{
        height: h, background: '#0a1020',
        borderRadius: 6, border: '1px solid ' + C.border,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: C.mute, fontSize: 10,
      }}>collecting…</div>
    );
  }
  const w = 300;
  const n = points.length;
  const toY = v => h - (v / max) * (h - 8) - 4;
  const coords = points.map((v, i) => ({
    x: (i / Math.max(1, n - 1)) * w,
    y: toY(v),
  }));
  const path = coords.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
  const fillPath = path + ` L ${w},${h} L 0,${h} Z`;
  return (
    <svg
      viewBox={`0 0 ${w} ${h}`}
      preserveAspectRatio="none"
      style={{
        display: 'block', width: '100%', height: h,
        background: '#0a1020', borderRadius: 6,
        border: '1px solid ' + C.border,
      }}
    >
      {target !== null && (
        <line
          x1={0} x2={w}
          y1={toY(target)} y2={toY(target)}
          stroke={color} strokeWidth={1} strokeDasharray="3 3" opacity={0.35}
          vectorEffect="non-scaling-stroke"
        />
      )}
      <path d={fillPath} fill={color + '22'} />
      <path d={path} fill="none" stroke={color} strokeWidth={2} vectorEffect="non-scaling-stroke" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

function M3_CoinFlip({ onNext }) {
  const [phase, setPhase] = useState('q');
  const [answer, setAnswer] = useState(null);
  const [coin1, setCoin1] = useState('idle');
  const [coin2, setCoin2] = useState('idle');
  const [submitted, setSubmitted] = useState(null);

  // Simulation state
  const [simN, setSimN] = useState(0);
  const [simY, setSimY] = useState(0);
  const [simTrueY, setSimTrueY] = useState(0);
  const [simHistory, setSimHistory] = useState([]); // [{t, trueRate, reportedRate}]
  const simTimerRef = useRef(null);

  // Analyst case-study state (separate 500-person scenario with hidden truth)
  const [analystGuess, setAnalystGuess] = useState(50);
  const [analystSubmitted, setAnalystSubmitted] = useState(false);
  const [caseStudy, setCaseStudy] = useState(null);

  const clearSimTimer = () => {
    if (simTimerRef.current) {
      clearInterval(simTimerRef.current);
      simTimerRef.current = null;
    }
  };

  // Run the coin flip flow for the user's answer
  const performFlip = (userAnswer) => {
    setAnswer(userAnswer);
    setPhase('flip');
    setCoin1('spinning');
    setCoin2('idle');
    setSubmitted(null);

    setTimeout(() => {
      const r1 = Math.random() < 0.5 ? 'heads' : 'tails';
      setCoin1(r1);
      setTimeout(() => {
        if (r1 === 'heads') {
          setSubmitted(userAnswer);
          setPhase('result');
        } else {
          setCoin2('spinning');
          setTimeout(() => {
            const r2 = Math.random() < 0.5 ? 'heads' : 'tails';
            setCoin2(r2);
            setTimeout(() => {
              setSubmitted(r2 === 'heads' ? 'YES' : 'NO');
              setPhase('result');
            }, 900);
          }, 450);
        }
      }, 1300);
    }, 500);
  };

  // Start the large-population simulation — track both raw truth and DP reported
  const runSimulation = () => {
    clearSimTimer();
    setSimN(0);
    setSimY(0);
    setSimTrueY(0);
    setSimHistory([]);
    setPhase('sim');
    let count = 0;
    let yes = 0;        // reported YES (noisy)
    let trueYes = 0;    // actual YES (the no-privacy baseline)
    simTimerRef.current = setInterval(() => {
      // Each respondent's actual answer (what they'd say without privacy)
      const actualYes = Math.random() < TRUE_RATE;
      if (actualYes) trueYes++;

      // Apply randomized-response coin protocol
      const flipOne = Math.random() < 0.5;
      let reportedYes;
      if (flipOne) {
        // Heads — report truth
        reportedYes = actualYes;
      } else {
        // Tails — random coin for the report
        reportedYes = Math.random() < 0.5;
      }
      if (reportedYes) yes++;
      count++;

      setSimN(count);
      setSimY(yes);
      setSimTrueY(trueYes);

      // Sample history every 6 respondents (or at the end) for the mini charts
      if (count % 6 === 0 || count === SIMULATION_N) {
        const trueRate = trueYes / count;
        const reportedRate = yes / count;
        setSimHistory(prev => [...prev, {
          t: count,
          trueRate: trueRate * 100,
          reportedRate: reportedRate * 100,
        }]);
      }

      if (count >= SIMULATION_N) {
        clearSimTimer();
        setTimeout(() => setPhase('insight'), 500);
      }
    }, 14);
  };

  useEffect(() => () => clearSimTimer(), []);

  // Denoise formula: p_reported = 0.5 * p_true + 0.5 * 0.5 = 0.25 + 0.5 * p_true
  //   → p_true = 2 * (p_reported - 0.25) = 2*p_reported - 0.5
  const rawRate = simN > 0 ? simY / simN : 0;
  const trueRateLive = simN > 0 ? simTrueY / simN : 0;
  const estimated = clamp(2 * rawRate - 0.5, 0, 1);

  // Which branch of the preview table did the user actually land on?
  const branch = coin1 === 'heads'
    ? { label: 'truth', chance: '50%', color: C.green, detail: `the server got your real answer (${answer})` }
    : coin2 === 'heads'
      ? { label: 'random → YES', chance: '25%', color: C.amber, detail: 'the coin picked YES for you — your real answer is hidden' }
      : coin2 === 'tails'
        ? { label: 'random → NO', chance: '25%', color: C.amber, detail: 'the coin picked NO for you — your real answer is hidden' }
        : null;

  const openAnalyst = () => {
    // Generate a fresh 500-person case study with a HIDDEN true rate
    const hiddenRate = 0.45; // "Have you ever copied someone else's work?"
    const caseN = 500;
    let yes = 0, trueYes = 0;
    for (let i = 0; i < caseN; i++) {
      const actualYes = Math.random() < hiddenRate;
      if (actualYes) trueYes++;
      const flip1 = Math.random() < 0.5;
      if (flip1) { if (actualYes) yes++; }
      else { if (Math.random() < 0.5) yes++; }
    }
    setCaseStudy({
      n: caseN,
      reportedRate: yes / caseN,
      trueRate: trueYes / caseN,
    });
    setAnalystGuess(50);
    setAnalystSubmitted(false);
    setPhase('analyst');
  };

function AnalystResult({ guess, dpEstimate, actualRate, rawReported }) {
  const guessError = Math.abs(guess - actualRate);
  const dpError = Math.abs(dpEstimate - actualRate);
  const youNailedIt = guessError <= 2;
  const youBeatFormula = guessError < dpError;

  const rows = [
    { lbl: '📊 What people really said',       val: actualRate,  col: C.blue,  note: 'the truth' },
    { lbl: '🎯 Your guess',                   val: guess,       col: C.amber, note: `${guessError}pt off` },
    { lbl: '🧮 Formula answer',               val: dpEstimate,  col: C.green, note: `${dpError}pt off` },
    { lbl: '🔀 What the server received',      val: rawReported, col: C.mute,  note: 'scrambled by coin flips' },
  ];

  return (
    <Card className="fade-up" style={{
      background: `linear-gradient(180deg, ${C.purple}10, transparent)`,
      border: `1px solid ${C.purple}55`,
      marginBottom: 14,
    }}>
      <div className="mono" style={{ fontSize: 9, color: C.purple, letterSpacing: '0.1em', marginBottom: 12, fontWeight: 700 }}>
        COMPARISON — HOW CLOSE WERE YOU?
      </div>

      {rows.map(row => (
        <div key={row.lbl} style={{ marginBottom: 14 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 5 }}>
            <span style={{ fontSize: 12.5, color: '#e2e8f0', fontWeight: 600 }}>{row.lbl}</span>
            <span className="mono" style={{ fontSize: 16, fontWeight: 700, color: row.col }}>{row.val}%</span>
          </div>
          <div style={{
            background: '#0a1020', borderRadius: 4, height: 16,
            overflow: 'hidden', border: '1px solid ' + C.border,
          }}>
            <div style={{
              height: '100%',
              width: row.val + '%',
              background: `linear-gradient(90deg, ${row.col}88, ${row.col})`,
              borderRadius: 4,
              transition: 'width 0.9s cubic-bezier(.2,.9,.3,1.2)',
              boxShadow: `0 0 8px ${row.col}44`,
            }} />
          </div>
          <div style={{ fontSize: 10, color: C.mute, marginTop: 3, textAlign: 'right' }}>{row.note}</div>
        </div>
      ))}

      <div style={{
        marginTop: 6,
        padding: '12px 14px',
        borderRadius: 10,
        background: (youNailedIt || youBeatFormula ? C.green : C.purple) + '15',
        border: `1px solid ${(youNailedIt || youBeatFormula ? C.green : C.purple)}55`,
        fontSize: 13, color: '#e2e8f0', lineHeight: 1.65,
      }}>
        {youNailedIt
          ? `🎯 Spot on — you were only ${guessError}pt away from the truth!`
          : youBeatFormula
            ? `⚡ Nice — you actually beat the formula this run! With only ${300} people there's some natural wobble, so a good gut feel can land close. With thousands of people, the formula always wins.`
            : `The formula landed ${dpError}pt from the truth; your guess was ${guessError}pt off. The formula gets more accurate as the group gets larger — with thousands of people it's nearly perfect.`
        }
      </div>
    </Card>
  );
}

const HOURLY_DATA = [2, 1, 1, 2, 4, 9, 22, 47, 60, 65, 61, 55, 51, 53, 58, 64, 59, 48, 38, 27, 19, 12, 7, 3]
  .map((v, i) => ({ hour: i, value: v * 900 + 2800 }));
const HD_MAX = Math.max(...HOURLY_DATA.map(d => d.value)) * 1.6;

const PRESETS = [

  { label: 'Apple Health',    eps: 2,    color: '#e85d5d' },

];

const CATEGORY_MAP = [
  { max: 0.25,     color: C.red,    text: 'Too much noise — results become meaningless' },
  { max: 0.6,      color: C.amber,  text: 'Strong privacy, low utility' },
  { max: 1.6,      color: C.green,  text: 'Recommended range — good balance' },

  { max: Infinity, color: C.red,    text: 'Very weak privacy — nearly unprotected' },
];

function EpsilonKnob({ eps, onChange }) {
  const svgRef = useRef(null);
  const logMin = Math.log(0.1);
  const logMax = Math.log(10);

  // Normalize eps to [0, 1] on a log scale
  const normalized = (Math.log(clamp(eps, 0.1, 10)) - logMin) / (logMax - logMin);
  const angle = -135 + normalized * 270;
  const rad = angle * Math.PI / 180;
  const indicatorX = 50 + 26 * Math.sin(rad);
  const indicatorY = 50 - 26 * Math.cos(rad);

  const arcPath = (r, a1, a2) => {
    const r1 = a1 * Math.PI / 180;
    const r2 = a2 * Math.PI / 180;
    const largeArc = (a2 - a1) > 180 ? 1 : 0;
    return `M${50 + r * Math.sin(r1)} ${50 - r * Math.cos(r1)}A${r} ${r} 0 ${largeArc} 1 ${50 + r * Math.sin(r2)} ${50 - r * Math.cos(r2)}`;
  };

  const handleInteraction = (clientX, clientY, rect) => {
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let a = Math.atan2(clientX - cx, -(clientY - cy)) * 180 / Math.PI;
    a = clamp(a, -135, 135);
    const newNorm = (a + 135) / 270;
    const newEps = Math.exp(logMin + newNorm * (logMax - logMin));
    onChange(+newEps.toFixed(2));
  };

  const onMouseDown = e => {
    e.preventDefault();
    const rect = svgRef.current.getBoundingClientRect();
    const move = me => handleInteraction(me.clientX, me.clientY, rect);
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
    handleInteraction(e.clientX, e.clientY, rect);
  };

  const onTouchStart = e => {
    e.preventDefault();
    const rect = svgRef.current.getBoundingClientRect();
    const move = te => {
      const t = te.touches[0];
      if (t) handleInteraction(t.clientX, t.clientY, rect);
    };
    const up = () => {
      document.removeEventListener('touchmove', move);
      document.removeEventListener('touchend', up);
    };
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('touchend', up);
    const t = e.touches[0];
    if (t) handleInteraction(t.clientX, t.clientY, rect);
  };

  const ticks = Array.from({ length: 11 }, (_, i) => {
    const a = (-135 + i * 27) * Math.PI / 180;
    const major = i % 5 === 0;
    return {
      x1: 50 + (major ? 38 : 41) * Math.sin(a),
      y1: 50 - (major ? 38 : 41) * Math.cos(a),
      x2: 50 + 44 * Math.sin(a),
      y2: 50 - 44 * Math.cos(a),
      major,
    };
  });

  return (
    <svg
      ref={svgRef}
      viewBox="0 0 100 100"
      style={{ width: 180, height: 180, cursor: 'grab', userSelect: 'none', touchAction: 'none' }}
      onMouseDown={onMouseDown}
      onTouchStart={onTouchStart}
    >
      <defs>
        <radialGradient id="knobGrad" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stopColor="#3b4a6b" />
          <stop offset="100%" stopColor="#1a2540" />
        </radialGradient>
        <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stopColor={C.red} />
          <stop offset="40%" stopColor={C.amber} />
          <stop offset="55%" stopColor={C.green} />
          <stop offset="80%" stopColor={C.amber} />
          <stop offset="100%" stopColor={C.red} />
        </linearGradient>
      </defs>

/* ═══════════════════════════════════════════════════════════════════
   MODULE 6 — PRIVACY BUDGET (The Secret Map)
   ═══════════════════════════════════════════════════════════════════ */
const BUDGET_MAX = 2.0;
const BASE_COST = 0.30;
const GRID_COLS = 5;
const GRID_ROWS = 4;
const TILE_COUNT = GRID_COLS * GRID_ROWS;
const DECOY_EMOJIS = ['🌵','🪨','🌿','🍄','🦴','🗿','🪵','🍃','🌾','🐚','🐾','🦎','🕸','🪶','🌸','🍂','🪺','🍁','🌼','🧭'];

const toEps       = v => +(0.10 + ((v - 1) * (1.50 - 0.10)) / 9).toFixed(2);
const tileCost    = eps => +(BASE_COST * (0.7 + eps * 0.9)).toFixed(2);
const tileBlurPx  = eps => Math.max(0, Math.round(14 - eps * 11));
const CHEAPEST    = tileCost(toEps(1));

function shuffleArr(a) {
  const arr = a.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* Attack simulator — a chain of 'harmless' aggregate queries that
   compose into a single-patient identification.  The budgetCap is
   the point where a 2.0 ε privacy budget runs out, halting the attack. */
const ATTACK_STEPS = [
  { query: 'SELECT COUNT(*) FROM registry;',                         count: 10000, cost: 0.30, narrow: 'entire registry' },
  { query: "WHERE age BETWEEN 45 AND 55",                             count: 2840,  cost: 0.30, narrow: 'age bracket' },

  { query: "AND stage = 'IIIB'",                                      count: 17,    cost: 0.35, narrow: 'disease stage' },
  { query: "AND treatment NOT IN ('chemo','radiation')",              count: 4,     cost: 0.40, narrow: 'treatment pattern' },
  { query: "AND insurance_status = 'uninsured' AND outcome='deceased'", count: 1,   cost: 0.40, narrow: 'single individual' },
];
const ATTACK_BUDGET_CAP_STEP = 5; // index at which a 2.0 ε budget is exhausted

const M6_CASE_STUDIES = [

function M6_Budget({ onNext }) {
  const [budget, setBudget]         = useState(BUDGET_MAX);
  const [sliderVal, setSliderVal]   = useState(5);
  const [treasureIdx, setTreasure]  = useState(() => Math.floor(Math.random() * TILE_COUNT));
  const [decoys, setDecoys]         = useState(() => shuffleArr(DECOY_EMOJIS));
  const [peeks, setPeeks]           = useState([]); // {idx, eps, cost, blur}
  const [phase, setPhase]           = useState('peeking'); // 'peeking' | 'guessing' | 'revealed'
  const [guessIdx, setGuess]        = useState(null);

  // Case-study unlock + attack simulator state
  const [caseUnlocked, setCaseUnlocked] = useState(false);
  const [attackStep, setAttackStep]     = useState(0);
  const [attackRunning, setAttackRun]   = useState(false);
  const [attackDone, setAttackDone]     = useState(false);
  const attackTimerRef                  = useRef(null);

  const eps        = toEps(sliderVal);
  const cost       = tileCost(eps);
  const blur       = tileBlurPx(eps);
  const canAfford  = +(budget - cost).toFixed(2) >= 0;
  const outOfBudget = budget < CHEAPEST;

  const budgetPct = Math.round((budget / BUDGET_MAX) * 100);
  const budgetColor = budgetPct > 55 ? C.green : budgetPct > 20 ? C.amber : budget > 0 ? C.red : '#475569';

  // Auto-advance to guessing phase when no cheap peek is affordable
  useEffect(() => {
    if (phase === 'peeking' && outOfBudget) setPhase('guessing');
  }, [budget, phase, outOfBudget]);

  // Unlock the real-world case study after the first full hunt (once, sticky)
  useEffect(() => {
    if (phase === 'revealed' && !caseUnlocked) setCaseUnlocked(true);
  }, [phase, caseUnlocked]);

  // Cleanup any running attack timer on unmount
  useEffect(() => () => { if (attackTimerRef.current) clearTimeout(attackTimerRef.current); }, []);

  const runAttack = () => {
    if (attackRunning) return;
    setAttackStep(0);
    setAttackDone(false);
    setAttackRun(true);
    let i = 0;
    const tick = () => {
      i++;
      setAttackStep(i);
      if (i < ATTACK_STEPS.length) {
        attackTimerRef.current = setTimeout(tick, 750);
      } else {
        setAttackRun(false);
        setAttackDone(true);
      }
    };
    attackTimerRef.current = setTimeout(tick, 650);
  };

  const resetAttack = () => {
    if (attackTimerRef.current) clearTimeout(attackTimerRef.current);
    setAttackStep(0);
    setAttackRun(false);
    setAttackDone(false);
  };

  const peekFor = idx => peeks.find(p => p.idx === idx);
  const tileEmoji = i => (i === treasureIdx ? '💎' : decoys[i % decoys.length]);

  const handleTile = i => {
    if (phase === 'peeking') {
      if (!canAfford || peekFor(i)) return;
      setBudget(b => Math.max(0, +(b - cost).toFixed(2)));
      setPeeks(prev => [...prev, { idx: i, eps, cost, blur }]);
    } else if (phase === 'guessing') {
      setGuess(i);
      setPhase('revealed');
    }
  };

  const readyToGuess = () => setPhase('guessing');

  const reset = () => {
    setBudget(BUDGET_MAX);
    setPeeks([]);
    setPhase('peeking');
    setGuess(null);
    setTreasure(Math.floor(Math.random() * TILE_COUNT));
    setDecoys(shuffleArr(DECOY_EMOJIS));
    setSliderVal(5);
  };

  const isWon = phase === 'revealed' && guessIdx === treasureIdx;

  // Contextual narrator tip
  let tip = null;
  if (phase === 'peeking' && peeks.length === 0) {
    tip = { color: C.blue, icon: '🧭', text: 'Drag the precision slider, then tap a tile. Higher ε = clearer view, but drains your budget faster.' };
  } else if (phase === 'peeking' && !outOfBudget) {
    tip = { color: C.teal, icon: '🔎', text: `You have ${peeks.length} peek${peeks.length === 1 ? '' : 's'} on the board. Hunt wisely — cheap blurry peeks help you scan, expensive clear peeks help you confirm.` };
  } else if (phase === 'guessing' && outOfBudget) {
    tip = { color: C.red, icon: '⛔', text: 'Budget exhausted — the system is locked. Commit to your best guess using the clues you have.' };

function ScoreScreen({ score, total, questions, answers, onRetake }) {
  const perfect = score === total;
  const awful = score <= 1;
  const great = score >= 8;
  const ok = score >= 5;

  const [remark, color] =
    perfect ? ['🏆 Flawless. You have genuinely mastered Differential Privacy.', C.green] :
    great   ? ['🎯 Excellent — you understand DP better than most engineers.', C.green] :
    ok      ? ['📘 Good foundation. A few concepts worth revisiting.', C.teal] :
    awful   ? ['😅 Don\'t worry — this is genuinely dense material. Work through the modules and come back.', C.red] :
              ['📚 Decent start. Review the modules on the ones you missed.', C.amber];

  // Confetti / animation elements
  const confettiPieces = useMemo(() => Array.from({ length: 30 }, (_, i) => ({
    color: [C.blue, C.green, C.amber, C.purple, C.teal, C.orange][i % 6],
    x: 2 + Math.random() * 96,
    delay: Math.random() * 1.4,
    scale: 0.5 + Math.random() * 0.8,
  })), [score]);

  const sadDrops = useMemo(() => Array.from({ length: 10 }, (_, i) => ({
    x: 5 + i * 9.5,
    delay: i * 0.14,
  })), [score]);

  return (
    <div style={{ padding: '1.5rem 1.25rem', maxWidth: 720, margin: '0 auto' }}>
      <div style={{ position: 'relative', height: 80, overflow: 'hidden', marginBottom: 10 }}>
        {perfect && confettiPieces.map((p, i) => (
          <div key={i} style={{
            position: 'absolute',
            left: p.x + '%',
            top: 0,
            width: 10 * p.scale,
            height: 10 * p.scale,
            borderRadius: 2,
            background: p.color,
            animation: `confetti ${1.3 + p.delay}s ease-in ${p.delay * 0.2}s both`,
          }} />
        ))}
        {!perfect && great && confettiPieces.slice(0, 16).map((p, i) => (
          <div key={i} style={{
            position: 'absolute',
            left: p.x + '%',
            top: 0,
            fontSize: 18,
            animation: `star ${1.4 + p.delay}s ease-in ${p.delay * 0.2}s both`,
          }}>⭐</div>
        ))}
        {awful && sadDrops.map((p, i) => (
          <div key={i} style={{
            position: 'absolute',
            left: p.x + '%',
            top: 0,
            fontSize: 24,
            animation: `sadDrop ${1.5 + p.delay}s ease-in ${p.delay}s both`,
          }}>😢</div>
        ))}
        {!perfect && !great && !awful && (
          <div className="mono" style={{ textAlign: 'center', paddingTop: 26, fontSize: 10, color: C.mute, letterSpacing: '0.08em' }}>
            RESULTS
          </div>
        )}
      </div>

      <Card style={{ textAlign: 'center', marginBottom: 22, padding: '28px 24px' }}>
        <div className="syne" style={{ fontSize: 60, fontWeight: 800, color, marginBottom: 10, lineHeight: 1 }}>
          {score}/{total}
        </div>
        <div style={{ display: 'flex', gap: 5, justifyContent: 'center', marginBottom: 18 }}>
          {answers.map((a, i) => {
            const correct = a === questions[i].a;
            return (
              <div key={i} style={{
                width: 28, height: 28, borderRadius: 7,
                background: correct ? C.green + '20' : C.red + '20',
                border: `1.5px solid ${correct ? C.green : C.red}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 13, fontWeight: 700,
                color: correct ? C.green : C.red,
              }}>
                {correct ? '✓' : '✗'}
              </div>
            );
          })}
        </div>
        <p style={{ fontSize: 15, color, fontWeight: 600, maxWidth: 460, margin: '0 auto 22px' }}>{remark}</p>
        <Button onClick={onRetake} color={C.purple} ghost>↺ Retake quiz</Button>
      </Card>

      <h3 className="syne" style={{ fontSize: 17, fontWeight: 800, marginBottom: 14, color: '#f1f5f9' }}>
        All questions — reviewed
      </h3>
      {questions.map((q, qi) => {
        const userA = answers[qi];
        const correct = userA === q.a;
        return (
          <Card key={qi} style={{ marginBottom: 12, border: `1px solid ${correct ? C.green : C.red}33`, padding: '16px 18px' }}>
            <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start', marginBottom: 12 }}>
              <div style={{
                width: 24, height: 24, borderRadius: '50%',
                background: correct ? C.green : C.red,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 13, fontWeight: 700, color: '#fff',
                flexShrink: 0, marginTop: 1,
              }}>
                {correct ? '✓' : '✗'}
              </div>
              <p style={{ fontSize: 14.5, fontWeight: 600, lineHeight: 1.5, color: '#e2e8f0' }}>
                {qi + 1}. {q.q}
              </p>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 5, marginBottom: 12 }}>
              {q.o.map((opt, oi) => {
                const isRight = oi === q.a;
                const isUser = oi === userA;
                return (
                  <div key={oi} style={{
                    padding: '8px 13px',
                    borderRadius: 7,
                    background: isRight ? C.green + '12' : isUser && !isRight ? C.red + '10' : 'transparent',
                    border: `1px solid ${isRight ? C.green : isUser && !isRight ? C.red : '#1e293b'}55`,
                    display: 'flex',
                    gap: 10,
                    alignItems: 'center',
                    fontSize: 13,
                    color: '#e2e8f0',
                  }}>
                    <span className="mono" style={{ fontSize: 11, color: isRight ? C.green : isUser && !isRight ? C.red : C.mute, flexShrink: 0 }}>
                      {String.fromCharCode(65 + oi)}.
                    </span>
                    <span style={{ flex: 1 }}>{opt}</span>
                    {isRight && <span style={{ fontSize: 11, color: C.green, fontWeight: 600, flexShrink: 0 }}>✓ correct</span>}
                    {isUser && !isRight && <span style={{ fontSize: 11, color: C.red, fontWeight: 600, flexShrink: 0 }}>← your answer</span>}
                  </div>
                );
              })}
            </div>
            <div style={{
              padding: '10px 14px',
              background: (correct ? C.green : C.red) + '08',
              borderRadius: 7,
              borderLeft: `3px solid ${correct ? C.green : C.red}`,
              fontSize: 12.5,
              color: '#cbd5e1',
              lineHeight: 1.65,
            }}>
              {q.e}
            </div>
          </Card>
        );
      })}
    </div>
  );
}

function M8_Quiz() {
  const [phase, setPhase] = useState('splash');
  const [questions, setQuestions] = useState([]);
  const [qIndex, setQIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answers, setAnswers] = useState([]);

  const start = () => {
    const shuffled = [...QUIZ_POOL].sort(() => Math.random() - 0.5).slice(0, 10);
    setQuestions(shuffled);
    setQIndex(0);
    setSelected(null);
    setAnswers([]);
    setPhase('active');
  };

  const pick = i => setSelected(i);

  const next = () => {
    const newAnswers = [...answers, selected];
    if (qIndex >= 9) {
      setAnswers(newAnswers);
      setPhase('review');
    } else {
      setAnswers(newAnswers);
      setQIndex(qIndex + 1);
      setSelected(null);
    }
  };

  if (phase === 'splash') {
    return (
      <div style={{ padding: '3rem 1.5rem 2rem', textAlign: 'center', maxWidth: 600, margin: '0 auto' }} className="fade-up">
        <div style={{
          width: 100, height: 100, borderRadius: '50%',
          margin: '0 auto 26px',
          background: `radial-gradient(circle, ${C.purple}22 0%, transparent 70%)`,
          border: `2px solid ${C.purple}44`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 44,
          boxShadow: `0 0 60px ${C.purple}33`,
        }}>🧠</div>
        <div style={{ marginBottom: 18 }}><Tag color={C.purple}>MODULE 8</Tag></div>
        <h2 className="syne" style={{ fontSize: 32, fontWeight: 800, marginBottom: 20, color: '#f1f5f9' }}>
          Think you've got it?
        </h2>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginBottom: 36, maxWidth: 420, margin: '0 auto 36px' }}>
          {[
            { icon: '🎲', label: '10 random Qs' },
            { icon: '🤫', label: 'Results at end' },
            { icon: '📖', label: 'Full review' },
          ].map(it => (
            <Card key={it.label} style={{ padding: '16px 10px', textAlign: 'center' }}>
              <div style={{ fontSize: 26, marginBottom: 8 }}>{it.icon}</div>
              <div style={{ fontSize: 12, color: C.mute }}>{it.label}</div>
            </Card>
          ))}
        </div>
        <Button onClick={start} color={C.purple}>Let's go →</Button>
      </div>
    );
  }

  if (phase === 'active') {
    const q = questions[qIndex];
    const progressPct = Math.round(((qIndex + 1) / 10) * 100);
    return (
      <div style={{ padding: '1.5rem 1.25rem', maxWidth: 680, margin: '0 auto' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div className="mono" style={{ fontSize: 12, color: C.mute, letterSpacing: '0.05em' }}>
            Question {qIndex + 1} of 10
          </div>
          <div className="mono" style={{ fontSize: 12, color: C.purple, fontWeight: 600 }}>
            {progressPct}%
          </div>
        </div>
        <div style={{ display: 'flex', gap: 5, marginBottom: 22 }}>
          {questions.map((_, i) => (
            <div key={i} style={{
              flex: 1,
              height: 5,
              borderRadius: 3,
              background: i < qIndex ? C.purple : i === qIndex ? C.purple + '66' : '#1e293b',
              transition: 'background 0.35s',
            }} />
          ))}
        </div>
        <Card key={qIndex} className="fade-up" style={{ marginBottom: 16, padding: '22px 20px' }}>
          <p style={{ fontSize: 17, fontWeight: 500, lineHeight: 1.55, marginBottom: 20, color: '#e2e8f0' }}>
            {q.q}
          </p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {q.o.map((opt, i) => {
              const picked = selected === i;
              return (
                <button
                  key={i}
                  onClick={() => pick(i)}
                  style={{
                    textAlign: 'left',
                    padding: '13px 16px',
                    borderRadius: 10,
                    fontFamily: 'inherit',
                    fontSize: 14,
                    cursor: 'pointer',
                    border: `1.5px solid ${picked ? C.purple : '#1e293b'}`,
                    background: picked ? C.purple + '15' : 'transparent',
                    color: '#e2e8f0',
                    transition: 'all 0.18s',
                    fontWeight: picked ? 600 : 500,
                    display: 'flex',
                    alignItems: 'center',
                    gap: 12,
                  }}
                  onMouseEnter={e => { if (!picked) e.currentTarget.style.background = '#14203a'; }}
                  onMouseLeave={e => { if (!picked) e.currentTarget.style.background = 'transparent'; }}
                >
                  <span style={{
                    width: 24, height: 24, borderRadius: '50%',
                    border: `1.5px solid ${picked ? C.purple : '#475569'}`,
                    flexShrink: 0,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    background: picked ? C.purple : 'transparent',
                    transition: 'all 0.18s',
                  }}>
                    {picked && <span style={{ width: 10, height: 10, borderRadius: '50%', background: '#fff' }} />}
                  </span>
                  <span style={{ flex: 1 }}>{opt}</span>
                </button>
              );
            })}
          </div>
        </Card>
        <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
          <Button onClick={next} disabled={selected === null} color={C.purple}>
            {qIndex === 9 ? 'See results →' : 'Next →'}
          </Button>
        </div>
      </div>
    );
  }

  if (phase === 'review') {
    return (
      <ScoreScreen
        score={answers.filter((a, i) => a === questions[i].a).length}
        total={10}
        questions={questions}
        answers={answers}
        onRetake={start}
      />
    );
  }

  return null;
}

/* ═══════════════════════════════════════════════════════════════════
   APP SHELL — Header, module switcher, footer nav, progress tracking
   ═══════════════════════════════════════════════════════════════════ */
const MODULES = [
  { label: 'Hook',        shortLabel: 'Intro',       color: C.red,    Component: M0_Hook },
  { label: 'Glossary',    shortLabel: 'Terms',       color: C.purple, Component: M1_Glossary },
  { label: 'Attacks',     shortLabel: 'Attacks',     color: C.red,    Component: M2_Attacks },
  { label: 'Coin Flip',   shortLabel: 'Coin',        color: C.green,  Component: M3_CoinFlip },
  { label: 'ε Dial',      shortLabel: 'ε Dial',      color: C.blue,   Component: M4_EpsilonDial },
  { label: 'Local/Central', shortLabel: 'Models',    color: C.teal,   Component: M5_LocalCentral },
  { label: 'Budget',      shortLabel: 'Budget',      color: C.orange, Component: M6_Budget },
  { label: 'Companies',   shortLabel: 'Industry',    color: C.amber,  Component: M7_Companies },
  { label: 'Quiz',        shortLabel: 'Quiz',        color: C.purple, Component: M8_Quiz },
];

function App() {
  // Load progress from session storage
  const getInitialState = () => {
    try {
      const saved = sessionStorage.getItem('dplearn_state');
      if (saved) {
        const parsed = JSON.parse(saved);
        return {
          mod: typeof parsed.mod === 'number' ? parsed.mod : 0,
          visited: Array.isArray(parsed.visited) ? parsed.visited : [0],
        };
      }
    } catch (e) {}
    return { mod: 0, visited: [0] };
  };

  const initial = getInitialState();
  const [mod, setMod] = useState(initial.mod);
  const [visited, setVisited] = useState(initial.visited);

  // Save progress to session storage
  useEffect(() => {
    try {
      sessionStorage.setItem('dplearn_state', JSON.stringify({ mod, visited }));
    } catch (e) {}
  }, [mod, visited]);

  const navigate = useCallback((newMod) => {
    if (newMod < 0 || newMod >= MODULES.length) return;
    setMod(newMod);
    setVisited(prev => prev.includes(newMod) ? prev : [...prev, newMod]);
    // Smooth scroll to top on nav change
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  // Keyboard shortcuts: arrow keys
  useEffect(() => {
    const onKey = e => {
      // Don't hijack input/textarea/select
      const tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

      if (e.key === 'ArrowRight' && mod < MODULES.length - 1) {
        e.preventDefault();
        navigate(mod + 1);
      } else if (e.key === 'ArrowLeft' && mod > 0) {
        e.preventDefault();
        navigate(mod - 1);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [mod, navigate]);

  const current = MODULES[mod];
  const CurrentComponent = current.Component;
  const progressPct = Math.round((visited.length / MODULES.length) * 100);

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      {/* ─── HEADER ───────────────────────────── */}
      <header style={{
        borderBottom: '1px solid #1e293b',
        padding: '12px 20px',
        background: 'rgba(11, 18, 32, 0.92)',
        backdropFilter: 'blur(12px)',
        WebkitBackdropFilter: 'blur(12px)',
        position: 'sticky',
        top: 0,
        zIndex: 100,
      }}>
        <div style={{
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
          flexWrap: 'wrap',
          gap: 12,
          maxWidth: 1100,
          margin: '0 auto',
        }}>
          <div
            onClick={() => navigate(0)}
            style={{ cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10 }}
          >
            <div style={{
              width: 28, height: 28, borderRadius: 8,
              background: `linear-gradient(135deg, ${C.blue}, ${C.purple})`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 16,
              boxShadow: `0 2px 12px ${C.blue}44`,
            }}>🔐</div>
            <div className="syne" style={{ fontSize: 17, fontWeight: 800, letterSpacing: '-0.02em' }}>
              <span style={{ color: C.blue }}>DP</span>
              <span style={{ color: '#e2e8f0' }}>learn</span>
            </div>
          </div>

          <nav style={{ display: 'flex', gap: 4, flexWrap: 'wrap', justifyContent: 'center' }} className="hide-mobile">
            {MODULES.map((m, i) => {
              const active = mod === i;
              const seen = visited.includes(i);
              return (
                <button
                  key={i}
                  onClick={() => navigate(i)}
                  style={{
                    fontFamily: 'inherit',
                    fontSize: 11,
                    fontWeight: 600,
                    padding: '5px 11px',
                    borderRadius: 20,
                    cursor: 'pointer',
                    transition: 'all 0.2s',
                    background: active ? m.color + '20' : 'transparent',
                    border: `1.5px solid ${active ? m.color : seen ? '#334155' : '#1e293b'}`,
                    color: active ? m.color : seen ? '#cbd5e1' : C.mute,
                    display: 'flex',
                    alignItems: 'center',
                    gap: 5,
                  }}
                >
                  {seen && !active && <span style={{ fontSize: 8, color: C.green }}>●</span>}
                  {m.shortLabel}
                </button>
              );
            })}
          </nav>

          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div className="mono hide-mobile" style={{ fontSize: 10, color: C.mute, letterSpacing: '0.05em' }}>
              {mod + 1}/{MODULES.length}
            </div>
            <div style={{ width: 60, height: 4, background: '#1e293b', borderRadius: 2, overflow: 'hidden' }}>
              <div style={{
                height: '100%',
                width: progressPct + '%',
                background: `linear-gradient(90deg, ${C.blue}, ${C.green})`,
                transition: 'width 0.4s',
                borderRadius: 2,
              }} />
            </div>
          </div>
        </div>

        {/* Mobile module pills — shown on narrow screens */}
        <div className="show-mobile" style={{ marginTop: 10, display: 'flex', gap: 4, flexWrap: 'wrap', justifyContent: 'center' }}>
          {MODULES.map((m, i) => {
            const active = mod === i;
            return (
              <button
                key={i}
                onClick={() => navigate(i)}
                style={{
                  fontFamily: 'inherit',
                  fontSize: 10,
                  fontWeight: 600,
                  padding: '4px 9px',
                  borderRadius: 20,
                  cursor: 'pointer',
                  background: active ? m.color + '20' : 'transparent',
                  border: `1.5px solid ${active ? m.color : '#1e293b'}`,
                  color: active ? m.color : C.mute,
                }}
              >
                {i + 1}
              </button>
            );
          })}
        </div>
      </header>

      {/* ─── MODULE CONTENT ───────────────────────── */}
      <main key={mod} className="fade-up" style={{ flex: 1, padding: '0 0 2rem' }}>
        <CurrentComponent onNext={mod < MODULES.length - 1 ? () => navigate(mod + 1) : undefined} />
      </main>

      {/* ─── FOOTER NAV ───────────────────────────── */}
      <footer style={{
        borderTop: '1px solid #1e293b',
        padding: '14px 20px',
        background: 'rgba(11, 18, 32, 0.92)',
        backdropFilter: 'blur(12px)',
        WebkitBackdropFilter: 'blur(12px)',
      }}>
        <div style={{
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
          maxWidth: 1100,
          margin: '0 auto',
          gap: 12,
        }}>
          <button
            onClick={() => navigate(Math.max(0, mod - 1))}
            disabled={mod === 0}
            style={{
              fontFamily: 'inherit',
              fontSize: 13,
              fontWeight: 600,
              padding: '9px 18px',
              borderRadius: 10,
              background: 'transparent',
              border: '1px solid #334155',
              color: mod === 0 ? C.mute : '#cbd5e1',
              cursor: mod === 0 ? 'not-allowed' : 'pointer',
              opacity: mod === 0 ? 0.4 : 1,
              transition: 'all 0.2s',
            }}
          >
            ← Prev
          </button>

          <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
            {MODULES.map((m, i) => (
              <div
                key={i}
                onClick={() => navigate(i)}
                style={{
                  width: mod === i ? 26 : 8,
                  height: 8,
                  borderRadius: 4,
                  cursor: 'pointer',
                  background: i <= mod ? m.color : '#1e293b',
                  transition: 'all 0.35s cubic-bezier(.2,.9,.3,1.2)',
                }}
              />
            ))}
          </div>

          <button
            onClick={() => navigate(Math.min(MODULES.length - 1, mod + 1))}
            disabled={mod === MODULES.length - 1}
            style={{
              fontFamily: 'inherit',
              fontSize: 13,
              fontWeight: 600,
              padding: '9px 18px',
              borderRadius: 10,
              background: mod === MODULES.length - 1 ? 'transparent' : C.blue,
              border: mod === MODULES.length - 1 ? '1px solid #334155' : 'none',
              color: mod === MODULES.length - 1 ? C.mute : '#fff',
              cursor: mod === MODULES.length - 1 ? 'not-allowed' : 'pointer',
              opacity: mod === MODULES.length - 1 ? 0.4 : 1,
              transition: 'all 0.2s',
              boxShadow: mod === MODULES.length - 1 ? 'none' : `0 4px 16px ${C.blue}44`,
            }}
          >
            Next →
          </button>
        </div>
        <div className="mono" style={{ textAlign: 'center', marginTop: 10, fontSize: 9, color: '#475569', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
          ← → arrow keys navigate modules
        </div>
      </footer>
    </div>
  );
}

/* ─── RENDER ──────────────────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
