  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0b1220; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 440px; text-align: center; padding: 36px 32px; border: 1px solid rgba(226, 232, 240, 0.08); border-radius: 14px; background: rgba(255, 255, 255, 0.02); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35); }
    .tag { font-size: 10px; letter-spacing: 0.18em; color: #64748b; text-transform: uppercase; margin-bottom: 14px; font-weight: 600; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 10px; color: #e2e8f0; letter-spacing: -0.01em; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.65; margin: 0 0 18px; }
    a { color: #60a5fa; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    .dots { display: inline-flex; gap: 6px; margin-top: 6px; }
    .dots span { width: 6px; height: 6px; border-radius: 50%; background: #60a5fa; opacity: 0.3; animation: pulse 1.4s ease-in-out infinite; }
    .dots span:nth-child(2) { animation-delay: 0.18s; }
    .dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.25); } }
    noscript p { text-align: center; padding: 24px; color: #94a3b8; }
  </style>

    </div>
